#http port
server:
  port: 8080
 

# 데이터 베이스 설정
spring:
    datasource:
      url: jdbc:mysql://localhost:3306/shop?serverTimezone=UTC&characterEncoding=UTF-8
      username: root
      password: root

# jpa 설정
    jpa:
      open-in-view: true
      hibernate:
        ddl-auto: create #update, none, create-drop, validate 
        naming:
          physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
      properties:
        hibernate:
#         show_sql: true
          format_sql: true
          
    thymeleaf:
      cache: false
          
          




